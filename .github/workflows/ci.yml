name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore Scrapbook.slnx

      - name: Build solution
        run: dotnet build Scrapbook.slnx --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Scrapbook.slnx --configuration Release --no-build

      - name: Upload NuGet package artifact
        uses: actions/upload-artifact@v7
        with:
          name: nuget-package
          path: Scrapbook/bin/Release/*.nupkg
          if-no-files-found: error
